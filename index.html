<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style-kids.css">
    <title>NaBasTala</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
  </head>
  
  <body>
    
    <header class="main-header" id="header">
      
      <nav class="top-nav" id="topNav">
        <div class="logo-section">
          <img src="logo.png" class="app-logo">
          <span class="brand-name">NaBasTala
          </span>
        </div>

        <div class="top-icon">
          <i class="bi bi-view-list icon"></i>
          <div class="notification">
            <i class="bi bi-bell icon"></i>
            <span class="badge">13</span>
          </div>
          <i class="bi bi-search icon" id="openSearch"></i>
        </div>
      </nav>
      
    <! ==== CATEGORY ==== >
      <div class="categories" id="category">
        <button class="chip active">Semua</button>
        <button class="chip">Belajar</button>
        <button class="chip">Musik</button>
        <button class="chip">Dongeng</button>
        <button class="chip">Kartun</button>
        <button class="chip">Sepak Bola</button>
        <button class="chip">Matematika</button>
        <button class="chip">Fisika</button>
      </div>
    </header>
    
    <! === KETIKA ICON SEARCH DI KLIK ==== >
   <div class="search-overlay" id="searchOverlay">
     <div class="search-container">
        <i class="bi bi-arrow-left icon" id="closeSearch"></i>
        <form id="searchForm">
          <input type="search" id="searchInput" placeholder="Telusuri Youkids" autocomplete="off" enterkeyhint="search">
        </form>
        <div class="mic-button">
          <i class="bi bi-mic-fill"></i>
        </div>
     </div>

     <div class="search-body" id="searchBody">
       <div id="searchPlayer" class="search-player"></div>
       <div id="searchResults"></div>

     </div>
   </div>
   
   <main class="main-content">
     <div id="videoDetailPage" class="video-detail-page">
       <div class="player-wrapper">
         <div class="back-btn-player" id="backToHome">
           <i class="bi bi-chevron-down"></i>
         </div>
         
        <div id="playerContent"></div>
        
       </div>

       <div class="detail-scroll-content">
         <div class="video-header-info">
           <h1 id="detailTitle">Judul Video</h1>
           <div class="meta-row">
             <span id="detailViews">0 x ditonton</span>
             <span id="detailDate">5 jam lalu</span>
             <span class="selengkapnya">...selengkapnya</span>
           </div>
         </div>

         <div class="channel-bar">
           <div class="channel-left">
             <img src="ayah.jpg" class="channel-img">
             <div class="channel-name">
               <h3>Koleksi Ayah Bunda</h3>
               <span>9.2jt Subscriber</span>
             </div>
           </div>
           
           <button class="btn-subscribe">Subscribe</button>
         </div>

         <div class="interaction-bar">
           <div class="btn-group">
             <button><i class="bi bi-hand-thumbs-up"></i><span>5,1 rb</span></button>
             <div class="divider"></div>
             <button><i class="bi bi-hand-thumbs-down"></i></button>
           </div>
           
            <button class="action-btn"><i class="bi bi-reply-all"></i> Bagikan</button>
            <button class="action-btn"><i class="bi bi-plus-circle"></i> Remix</button>
            <button class="action-btn"><i class="bi bi-download"></i> Simpan</button>
         </div>

         <div class="comment-preview" id="commentTrigger">
           <div class="comment-header">
             <span><b> Komentar </b> <span id="commentCount">561</span></span>
             <i class="bi bi-chevron-expand"></i>
           </div>

           <div class="comment-body">
             <img src="MAMA.JPG" class="user-pfp" id="commentUserImg">
           <div class="comment-content">
             <p id="commentText">Wah videonya bagus sekali, anak saya suka!</p>
           </div>
</div>

         </div>

         <div id="rekomendasiSection" class="rekomendasi-container"></div>
       </div>
     </div>


     <div class="video-grid" id="videoFeed"></div>
   </main>
    
    
  <! === NAVIGASI BAWAH ==== >
   <nav class="bottom-nav" id="bottomNav">
     <div class="nav-item active">
       <i class="bi bi-house-door-fill"></i>
       <span>Beranda</span>
     </div>
     
     <div class="nav-item">
       <i class="bi bi-play-btn"></i>
       <span>Shorts</span>
     </div>
     
     <div class="plus-btn">
        <i class="bi bi-plus-lg"></i>
     </div>
     
     <div class="nav-item">
       <i class="bi bi-collection-play"></i>
       <span>Subscription</span>
     </div>
     
     <div class="nav-item">
       <div class="user-avatar-container">
         <img src="ayah.jpg" alt="Profil" class="user-avatar-img">
       </div>
       <span>Anda</span>
     </div>
   </nav>
    
   <script src="data.js"></script>
   <script src="daftarkomentar.js"></script> 
   <script src="script_kids.js"></script>
  </body>
</html>
